<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kashif Agency — Admin Panel</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-orb orb1" aria-hidden="true"></div>
    <div class="bg-orb orb2" aria-hidden="true"></div>

    <!-- Admin Nav -->
    <nav class="admin-nav">
      <div class="admin-nav-logo">KA Admin</div>
      <div class="admin-nav-links">
        <button class="export-btn" id="export-btn" onclick="exportCSV()">
          Export CSV
        </button>
        <button class="btn-danger-soft" onclick="clearAll()">Clear All</button>
        <a href="index.html" class="admin-nav-link"> Back to Website <i class="fa-solid fa-right-from-bracket"></i> </a>
      </div>
    </nav>

    <!-- Admin Content -->
    <div class="admin-wrapper">
      <div class="admin-header">
        <div class="admin-title">Contact Submissions</div>
        <div class="admin-subtitle">
          View and manage all form submissions from your website
        </div>
      </div>

      <!-- Stats row -->
      <div class="admin-stats" id="admin-stats"></div>

      <!-- Search + Filter -->
      <div class="d-flex gap-3 align-items-center mb-3 flex-wrap">
        <input
          type="text"
          class="search-input"
          id="search-input"
          placeholder="Search submissions..."
          oninput="filterSubmissions(this.value)"
        />
        <select
          class="search-input"
          id="service-filter"
          onchange="filterByService(this.value)"
          style="width: auto; background:var(--bg-darkNavy)"
        >
          <option value="">All Services</option>
        </select>
        <span
          id="result-count"
          style="
            color: var(--muted);
            font-size: 0.82rem;
            font-family: &quot;Syne&quot;, sans-serif;
          "
        ></span>
      </div>

      <!-- Table Card -->
      <div class="admin-card">
        <div class="admin-table-wrap">
          <table class="admin-table" id="submissions-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Service</th>
                <th>Message</th>
                <th>Date & Time</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="submissions-body"></tbody>
          </table>
        </div>
        <div class="admin-empty" id="admin-empty" style="display: none">
          <div class="admin-empty-icon">📭</div>
          <div
            style="
              font-family: &quot;Syne&quot;, sans-serif;
              font-size: 1.1rem;
              margin-bottom: 0.5rem;
            "
          >
            No submissions yet
          </div>
          <div>Form submissions from your website will appear here.</div>
        </div>
      </div>
    </div>

    <script>
      // ── Data ─────────────────────────────────────────────
      function getSubmissions() {
        return JSON.parse(localStorage.getItem("ka_submissions") || "[]");
      }
      function saveSubmissions(data) {
        localStorage.setItem("ka_submissions", JSON.stringify(data));
      }

      // ── Render Stats ─────────────────────────────────────
      function renderStats(data) {
        const services = [
          ...new Set(data.map((d) => d.service).filter(Boolean)),
        ];
        const today = data.filter(
          (d) =>
            d.date ===
            new Date().toLocaleDateString("en-PK", {
              year: "numeric",
              month: "short",
              day: "numeric",
            }),
        ).length;

        const statsEl = document.getElementById("admin-stats");
        statsEl.innerHTML = `
        <div class="admin-stat-card">
          <div class="admin-stat-num">${data.length}</div>
          <div class="admin-stat-label">Total Submissions</div>
        </div>
        <div class="admin-stat-card">
          <div class="admin-stat-num">${today}</div>
          <div class="admin-stat-label">Today</div>
        </div>
        <div class="admin-stat-card">
          <div class="admin-stat-num">${services.length}</div>
          <div class="admin-stat-label">Services Requested</div>
        </div>
        <div class="admin-stat-card">
          <div class="admin-stat-num">${data.length > 0 ? "✓" : "—"}</div>
          <div class="admin-stat-label">Status</div>
        </div>`;
      }

      // ── Render Table ──────────────────────────────────────
      function renderTable(data) {
        const tbody = document.getElementById("submissions-body");
        const empty = document.getElementById("admin-empty");
        const countEl = document.getElementById("result-count");

        countEl.textContent = `Showing ${data.length} record${data.length !== 1 ? "s" : ""}`;

        if (!data.length) {
          tbody.innerHTML = "";
          empty.style.display = "block";
          return;
        }
        empty.style.display = "none";

        tbody.innerHTML = data
          .map(
            (row, i) => `
        <tr onclick="toggleDetail('detail-${row.id}')" style="cursor:pointer">
          <td style="color:var(--muted);font-size:0.8rem">${i + 1}</td>
          <td><strong style="color:var(--muted)">${escHtml(row.name)}</strong></td>
          <td><a href="mailto:${escHtml(row.email)}" style="color:var(--muted)" onclick="event.stopPropagation()">${escHtml(row.email)}</a></td>
          <td>${row.phone ? escHtml(row.phone) : '<span style="opacity:.4">—</span>'}</td>
          <td>${row.service ? `<span class="badge-service">${escHtml(row.service)}</span>` : '<span style="opacity:.4">—</span>'}</td>
          <td><div class="message-cell">${escHtml(row.message)}</div></td>
          <td style="white-space:nowrap;font-size:0.8rem">${row.date}<br><span style="color:var(--muted)">${row.time}</span></td>
          <td onclick="event.stopPropagation()">
            <button onclick="deleteRow(${row.id})" style="background:none;border:none;color:var(--muted);cursor:pointer;padding:4px" title="Delete">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            </button>
          </td>
        </tr>
        <tr class="row-detail" style="background:var(--bg-darkNavy)" id="detail-${row.id}">
          <td colspan="8">
            <strong style="font-family:'Syne',sans-serif;font-size:0.82rem;color:var(--gold)">FULL MESSAGE</strong>
            <div class="detail-message">${escHtml(row.message)}</div>
          </td>
        </tr>`,
          )
          .join("");
      }

      // ── Toggle row detail ─────────────────────────────────
      function toggleDetail(id) {
        const el = document.getElementById(id);
        if (el) el.classList.toggle("open");
      }

      // ── Delete Row ────────────────────────────────────────
      function deleteRow(id) {
        if (!confirm("Delete this submission?")) return;
        const data = getSubmissions().filter((d) => d.id !== id);
        saveSubmissions(data);
        load();
      }

      // ── Clear All ─────────────────────────────────────────
      function clearAll() {
        if (!confirm("Delete ALL submissions? This cannot be undone.")) return;
        localStorage.removeItem("ka_submissions");
        load();
      }

      // ── Search ────────────────────────────────────────────
      let allData = [];
      function filterSubmissions(query) {
        const q = query.toLowerCase();
        const service = document.getElementById("service-filter").value;
        const filtered = allData.filter((d) => {
          const matchQ =
            !q ||
            [d.name, d.email, d.phone, d.message, d.service].some((v) =>
              (v || "").toLowerCase().includes(q),
            );
          const matchS = !service || d.service === service;
          return matchQ && matchS;
        });
        renderTable(filtered);
      }
      function filterByService(val) {
        filterSubmissions(document.getElementById("search-input").value);
      }

      // ── Export CSV ────────────────────────────────────────
      function exportCSV() {
        const data = getSubmissions();
        if (!data.length) {
          alert("No submissions to export.");
          return;
        }
        const headers = [
          "#",
          "Name",
          "Email",
          "Phone",
          "Service",
          "Message",
          "Date",
          "Time",
        ];
        const rows = data.map((d, i) => [
          i + 1,
          d.name,
          d.email,
          d.phone || "",
          d.service || "",
          d.message.replace(/,/g, " "),
          d.date,
          d.time,
        ]);
        const csv = [headers, ...rows]
          .map((r) => r.map((c) => `"${c}"`).join(","))
          .join("\n");
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([csv], { type: "text/csv" }));
        a.download = `kashif-agency-submissions-${Date.now()}.csv`;
        a.click();
      }

      // ── Escape HTML ───────────────────────────────────────
      function escHtml(str) {
        if (!str) return "";
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      // ── Populate service filter ───────────────────────────
      function populateServiceFilter(data) {
        const services = [
          ...new Set(data.map((d) => d.service).filter(Boolean)),
        ];
        const sel = document.getElementById("service-filter");
        services.forEach((s) => {
          const opt = document.createElement("option");
          opt.value = s;
          opt.textContent = s;
          sel.appendChild(opt);
        });
      }

      // ── Main Load ─────────────────────────────────────────
      function load() {
        allData = getSubmissions().reverse(); // newest first
        renderStats(allData);
        populateServiceFilter(allData);
        renderTable(allData);
      }
      load();
    </script>
  </body>
</html>
