<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — Kashif Agency</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .admin-topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(5,8,18,0.95); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border); padding: 14px 0;
    }
    .admin-topbar .container {
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    }
    .admin-topbar .brand {
      font-family: var(--font-display); font-weight: 800; font-size: 1.1rem;
      display: flex; align-items: center; gap: 10px;
    }
    .admin-topbar .brand .logo-mark {
      width: 34px; height: 34px; font-size: 0.8rem;
    }
    .msg-cell { max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .clear-btn {
      padding: 8px 20px; border-radius: 50px;
      background: rgba(244,63,94,0.12); border: 1.5px solid rgba(244,63,94,0.3);
      color: #f43f5e; font-size: 0.85rem; font-weight: 600;
      transition: var(--transition); font-family: var(--font-body);
    }
    .clear-btn:hover { background: rgba(244,63,94,0.2); }
    .export-btn {
      padding: 8px 20px; border-radius: 50px;
      background: var(--primary-dim); border: 1.5px solid var(--border-glow);
      color: var(--primary); font-size: 0.85rem; font-weight: 600;
      transition: var(--transition); font-family: var(--font-body);
    }
    .export-btn:hover { background: rgba(0,212,255,0.12); }
  </style>
</head>
<body>

  <div class="admin-topbar">
    <div class="container">
      <div class="brand">
        <div class="logo-mark">KA</div>
        <span>Admin <span style="color:var(--primary)">Panel</span></span>
      </div>
      <div style="display:flex; gap:10px; align-items:center">
        <a href="index.html" class="export-btn">← Back to Site</a>
        <button class="export-btn" onclick="exportCSV()">Export CSV</button>
        <button class="clear-btn" onclick="clearAll()">Clear All</button>
      </div>
    </div>
  </div>

  <div class="admin-page">
    <div class="container">
      <div class="admin-header">
        <div>
          <h1>Contact <span style="color:var(--primary)">Submissions</span></h1>
          <p style="color:var(--text-muted); margin-top:4px; font-size:0.9rem">All form submissions are stored in your browser's localStorage.</p>
        </div>
      </div>

      <div class="admin-stats" id="adminStats"></div>

      <div id="adminContent"></div>
    </div>
  </div>

  <script src="data/content.js"></script>
  <script>
    // ── LOAD & DISPLAY SUBMISSIONS ─────────────────
    function loadSubmissions() {
      return JSON.parse(localStorage.getItem('ka_submissions') || '[]');
    }

    function renderAdmin() {
      const data = loadSubmissions();
      const stats = document.getElementById('adminStats');
      const content = document.getElementById('adminContent');

      // Stats
      const services = {};
      data.forEach(d => { services[d.service] = (services[d.service] || 0) + 1; });
      const topService = Object.entries(services).sort((a,b) => b[1]-a[1])[0];

      stats.innerHTML = `
        <div class="a-stat">
          <div class="a-stat-val">${data.length}</div>
          <div class="a-stat-label">Total Submissions</div>
        </div>
        <div class="a-stat">
          <div class="a-stat-val">${data.filter(d => d.status==='new').length}</div>
          <div class="a-stat-label">New / Unread</div>
        </div>
        <div class="a-stat">
          <div class="a-stat-val">${topService ? topService[1] : 0}</div>
          <div class="a-stat-label">Top Service Requests</div>
        </div>
        <div class="a-stat" style="max-width:200px">
          <div class="a-stat-val" style="font-size:1rem; padding-top:4px">${topService ? topService[0] : '—'}</div>
          <div class="a-stat-label">Most Requested</div>
        </div>
      `;

      if (!data.length) {
        content.innerHTML = `
          <div class="admin-table-wrap">
            <div class="no-data">
              <div style="font-size:3rem; margin-bottom:1rem">📭</div>
              <h3 style="font-family:var(--font-display); font-size:1.2rem; margin-bottom:0.5rem">No Submissions Yet</h3>
              <p>Contact form submissions will appear here once visitors fill out the form on your website.</p>
            </div>
          </div>
        `;
        return;
      }

      // Sort newest first
      const sorted = [...data].reverse();

      content.innerHTML = `
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Service</th>
                <th>Message</th>
                <th>Date & Time</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              ${sorted.map((row, i) => `
                <tr>
                  <td style="color:var(--text-muted)">${sorted.length - i}</td>
                  <td style="font-weight:600; color:var(--text-main)">${escHtml(row.name)}</td>
                  <td><a href="mailto:${escHtml(row.email)}" style="color:var(--primary)">${escHtml(row.email)}</a></td>
                  <td>${escHtml(row.phone || '—')}</td>
                  <td>
                    <span style="
                      display:inline-block; padding:3px 10px; border-radius:20px;
                      font-size:0.75rem; font-weight:700;
                      background:rgba(124,58,237,0.12); color:#a78bfa;
                      border:1px solid rgba(124,58,237,0.3);
                    ">${escHtml(row.service || '—')}</span>
                  </td>
                  <td class="msg-cell" title="${escHtml(row.message)}">${escHtml(row.message)}</td>
                  <td style="white-space:nowrap; font-size:0.82rem">${escHtml(row.datetime)}</td>
                  <td><span class="status-new">New</span></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function escHtml(str) {
      return String(str || '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function clearAll() {
      if (confirm('Delete all submissions? This cannot be undone.')) {
        localStorage.removeItem('ka_submissions');
        renderAdmin();
      }
    }

    function exportCSV() {
      const data = loadSubmissions();
      if (!data.length) { alert('No submissions to export.'); return; }
      const headers = ['ID','Name','Email','Phone','Service','Message','DateTime','Status'];
      const rows = data.map(r => [
        r.id, r.name, r.email, r.phone || '', r.service, r.message.replace(/\n/g,' '), r.datetime, r.status
      ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(','));
      const csv = [headers.join(','), ...rows].join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'kashif-agency-submissions.csv'; a.click();
      URL.revokeObjectURL(url);
    }

    // Boot
    document.title = 'Admin Panel — Kashif Agency';
    renderAdmin();

    // Listen for new submissions from other tabs
    window.addEventListener('storage', (e) => {
      if (e.key === 'ka_submissions') renderAdmin();
    });
  </script>

</body>
</html>
